name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake

    - name: Set up dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install cmake

    - name: Set up dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        choco install cmake

    - name: Configure CMake
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Upload Release Assets
      uses: softprops/action-gh-release@v1
      with:
        files: build/fermecpp${{ runner.os == 'Windows' && '.exe' || '' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Send Discord Notification
      if: always()
      run: python3 .github/scripts/notify-discord.py
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        JOB_STATUS: ${{ job.status }}
        BUILD_TITLE: "Release Build - ${{ matrix.os }}"
        RUNNER_OS: ${{ matrix.os }}
        COMPILER: "Release"
        ARTIFACT_NAME: fermecpp-${{ matrix.os }}
