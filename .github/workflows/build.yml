name: Build CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        compiler: [gcc, clang]
        exclude:
          # Windows ne supporte pas gcc avec make
          - os: windows-latest
            compiler: gcc

    steps:
    - uses: actions/checkout@v4

    - name: Set up dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake

    - name: Set up dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install cmake

    - name: Set up dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        choco install cmake

    - name: Configure CMake
      run: |
        cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Upload artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: fermecpp-${{ matrix.os }}-${{ matrix.compiler }}
        path: build/fermecpp${{ runner.os == 'Windows' && '.exe' || '' }}
        retention-days: 5
